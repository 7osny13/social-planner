<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحجاز هومز — خطة السوشيال ميديا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary:#1a1a2e; --accent:#c9933a; --accent-light:#f0c270;
  --bg:#f5f5f0; --card:#fff; --text:#1a1a2e; --text-muted:#888;
  --success:#27ae60; --danger:#e74c3c; --border:#e8e8e0;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
.app { width:100%; max-width:430px; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }
.header { background:var(--primary); color:white; padding:18px 20px 14px; position:sticky; top:0; z-index:100; }
.header-title { font-size:1.1rem; font-weight:900; }
.header-subtitle { font-size:0.78rem; opacity:0.6; margin-top:2px; }
.header-accent { color:var(--accent-light); }
.sync-status { font-size:0.72rem; margin-top:4px; opacity:0.7; }
.tabs { display:flex; background:var(--primary); padding:0 20px; gap:4px; border-bottom:2px solid rgba(255,255,255,0.1); }
.tab { flex:1; padding:10px 4px; text-align:center; font-size:0.78rem; font-weight:600; color:rgba(255,255,255,0.5); cursor:pointer; border-bottom:3px solid transparent; transition:all 0.2s; font-family:'Cairo',sans-serif; background:none; border-top:none; border-left:none; border-right:none; }
.tab.active { color:var(--accent-light); border-bottom-color:var(--accent-light); }
.content { flex:1; padding:16px; padding-bottom:80px; overflow-y:auto; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* CARDS */
.date-header { background:var(--card); border-radius:14px; padding:14px 18px; margin-bottom:16px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; }
.date-text { font-size:1rem; font-weight:700; }
.date-sub { font-size:0.78rem; color:var(--text-muted); margin-top:2px; }
.progress-card { background:var(--primary); border-radius:14px; padding:14px 18px; margin-bottom:16px; color:white; }
.progress-label { font-size:0.82rem; opacity:0.8; margin-bottom:8px; }
.progress-bar { background:rgba(255,255,255,0.2); border-radius:8px; height:8px; overflow:hidden; }
.progress-fill { background:var(--accent-light); height:100%; border-radius:8px; transition:width 0.4s; }
.progress-count { font-size:1.1rem; font-weight:900; margin-top:6px; color:var(--accent-light); }

.post-card { background:var(--card); border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:var(--shadow); border-right:4px solid var(--border); }
.post-card.published { border-right-color:var(--success); opacity:0.8; }
.post-card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.post-type-badge { background:var(--primary); color:var(--accent-light); padding:4px 10px; border-radius:20px; font-size:0.75rem; font-weight:700; white-space:nowrap; }
.post-topic { font-size:0.9rem; font-weight:700; flex:1; }
.post-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.publish-check { display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); cursor:pointer; }
.publish-check input[type="checkbox"] { width:20px; height:20px; accent-color:var(--success); cursor:pointer; }
.publish-check-label { font-size:0.85rem; font-weight:600; }
.card-edit-row { display:flex; gap:6px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }

/* BUTTONS */
.btn { padding:7px 14px; border-radius:20px; font-size:0.78rem; font-weight:700; cursor:pointer; border:none; font-family:'Cairo',sans-serif; transition:all 0.15s; }
.btn-outline { background:transparent; border:1.5px solid var(--primary); color:var(--primary); }
.btn-outline:hover { background:var(--primary); color:white; }
.btn-accent { background:var(--accent); color:white; }
.btn-success { background:var(--success); color:white; }
.btn-danger { background:var(--danger); color:white; }
.btn-sm { padding:5px 10px; font-size:0.72rem; }
.btn-primary { background:var(--primary); color:white; }
.btn-full { width:100%; padding:12px; border-radius:12px; font-size:0.9rem; font-weight:700; cursor:pointer; border:none; font-family:'Cairo',sans-serif; }

/* WEEK */
.week-day { background:var(--card); border-radius:14px; padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); display:flex; align-items:center; gap:12px; cursor:pointer; transition:transform 0.15s; }
.week-day:hover { transform:translateX(-2px); }
.week-day.today { border-right:4px solid var(--accent); }
.week-day.published-day { border-right:4px solid var(--success); }
.day-name { font-size:0.85rem; font-weight:700; min-width:60px; }
.day-date { font-size:0.72rem; color:var(--text-muted); }
.day-content { flex:1; }
.day-type { font-size:0.8rem; font-weight:600; color:var(--accent); }
.day-topic { font-size:0.82rem; color:var(--text-muted); }
.day-status { font-size:1.2rem; }

/* CALENDAR */
.month-header { text-align:center; font-size:1rem; font-weight:700; margin-bottom:12px; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:16px; }
.cal-header { text-align:center; font-size:0.7rem; font-weight:700; color:var(--text-muted); padding:4px; }
.cal-day { background:var(--card); border-radius:8px; padding:6px 3px; text-align:center; min-height:52px; cursor:pointer; transition:all 0.15s; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.cal-day:hover { transform:scale(1.05); }
.cal-day.empty { background:transparent; box-shadow:none; cursor:default; }
.cal-day.today { border:2px solid var(--accent); }
.cal-day.has-content { border-right:3px solid var(--accent); }
.cal-day.published-cal { border-right:3px solid var(--success); }
.cal-day-num { font-size:0.72rem; font-weight:700; }
.cal-day-emoji { font-size:1rem; display:block; margin-top:2px; }
.cal-day-check { font-size:0.7rem; display:block; }

/* IDEAS */
.idea-card { background:var(--card); border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
.idea-card.used { opacity:0.7; border-right:4px solid var(--success); }
.idea-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.idea-type { background:var(--primary); color:var(--accent-light); padding:4px 10px; border-radius:20px; font-size:0.75rem; font-weight:700; }
.idea-topic { font-size:0.9rem; font-weight:700; flex:1; }
.idea-used-badge { font-size:0.72rem; color:var(--text-muted); background:var(--bg); padding:3px 8px; border-radius:10px; }
.collapsible { margin-top:10px; }
.collapsible-btn { background:var(--bg); border:none; padding:8px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; cursor:pointer; color:var(--primary); font-family:'Cairo',sans-serif; width:100%; text-align:right; display:flex; justify-content:space-between; align-items:center; }
.collapsible-content { display:none; background:#fafaf7; border-radius:8px; padding:12px; margin-top:6px; font-size:0.82rem; line-height:1.7; white-space:pre-wrap; direction:rtl; }
.collapsible-content.open { display:block; }
.idea-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-width:430px; max-height:90vh; overflow-y:auto; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-title { font-size:1rem; font-weight:900; color:var(--primary); margin-bottom:4px; }
.modal-type { font-size:0.78rem; color:var(--accent); font-weight:600; margin-bottom:14px; }
.modal-body { font-size:0.85rem; line-height:1.8; white-space:pre-wrap; background:var(--bg); padding:14px; border-radius:10px; direction:rtl; margin-bottom:14px; }
.modal-close { width:100%; margin-top:8px; padding:12px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:0.9rem; font-weight:700; cursor:pointer; font-family:'Cairo',sans-serif; }

/* FORM */
.form-group { margin-bottom:14px; }
.form-label { font-size:0.82rem; font-weight:700; color:var(--primary); margin-bottom:6px; display:block; }
.form-input, .form-textarea, .form-select { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:10px; font-family:'Cairo',sans-serif; font-size:0.85rem; color:var(--text); background:white; outline:none; direction:rtl; }
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--accent); }
.form-textarea { min-height:100px; resize:vertical; }
.form-row { display:flex; gap:8px; }
.form-row .form-group { flex:1; }

.section-title { font-size:0.82rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin:16px 0 10px; display:flex; justify-content:space-between; align-items:center; }
.empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:0.9rem; }
.empty-state span { font-size:2.5rem; display:block; margin-bottom:10px; }

.fab { position:fixed; bottom:24px; left:20px; width:52px; height:52px; background:var(--accent); border-radius:50%; border:none; font-size:1.5rem; cursor:pointer; box-shadow:0 4px 16px rgba(201,147,58,0.4); z-index:200; display:flex; align-items:center; justify-content:center; transition:transform 0.15s; }
.fab:hover { transform:scale(1.1); }

.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--primary); color:white; padding:10px 20px; border-radius:20px; font-size:0.82rem; font-weight:600; font-family:'Cairo',sans-serif; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }

.week-edit-btns { display:flex; gap:6px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">🏗️ <span class="header-accent">ELHEGAZ HOMES</span></div>
    <div class="header-subtitle">خطة السوشيال ميديا — فيسبوك</div>
    <div class="sync-status" id="sync-status">⏳ جاري التزامن...</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">اليوم</button>
    <button class="tab" onclick="switchTab('week')">الأسبوع</button>
    <button class="tab" onclick="switchTab('month')">الشهر</button>
    <button class="tab" onclick="switchTab('ideas')">الأفكار</button>
  </div>
  <div class="content">
    <div class="tab-panel active" id="panel-today"></div>
    <div class="tab-panel" id="panel-week"></div>
    <div class="tab-panel" id="panel-month"></div>
    <div class="tab-panel" id="panel-ideas"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab-btn" onclick="fabAction()" title="إضافة">＋</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL: view content -->
<div class="modal-overlay" id="modal-view" onclick="closeModalView(event)">
  <div class="modal">
    <div class="modal-title" id="mv-title"></div>
    <div class="modal-type" id="mv-type"></div>
    <div class="modal-body" id="mv-body"></div>
    <button class="modal-close" onclick="closeModalViewDirect()">إغلاق</button>
  </div>
</div>

<!-- MODAL: edit post -->
<div class="modal-overlay" id="modal-edit-post" onclick="closeModalIf(event,'modal-edit-post')">
  <div class="modal">
    <div class="modal-title">✏️ تعديل البوست</div>

      <div class="form-group">
        <label class="form-label">نوع المحتوى</label>
        <select class="form-select" id="ep-type">
          <option value="📸 صورة">📸 صورة</option>

          <option value="📝 بوست نصي">📝 بوست نصي</option>

      </div>
      <div class="form-group">
        <label class="form-label">الموضوع</label>
        <input class="form-input" id="ep-topic" placeholder="موضوع البوست">
      </div>
      <div class="form-group">
        <label class="form-label">الكابشن</label>
        <textarea class="form-textarea" id="ep-caption" rows="5"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">السيناريو (للريلز والفيديو)</label>
        <textarea class="form-textarea" id="ep-scenario" rows="4" placeholder="اختياري"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary btn-full" onclick="saveEditPost()">💾 حفظ</button>
        <button class="btn btn-outline btn-full" onclick="closeModal('modal-edit-post')">إلغاء</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: add/edit idea -->
<div class="modal-overlay" id="modal-edit-idea" onclick="closeModalIf(event,'modal-edit-idea')">

    <div class="modal-title" id="ei-title">💡 إضافة فكرة</div>

      <div class="form-group">
        <label class="form-label">نوع المحتوى</label>
        <select class="form-select" id="ei-type">

          <option value="📝 بوست نصي">📝 بوست نصي</option>

      <div class="form-group">
        <label class="form-label">الموضوع</label>
        <input class="form-input" id="ei-topic" placeholder="موضوع الفكرة">
      </div>
      <div class="form-group">
        <label class="form-label">الكابشن</label>
        <textarea class="form-textarea" id="ei-caption" rows="5"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">السيناريو (للريلز والفيديو)</label>
        <textarea class="form-textarea" id="ei-scenario" rows="4" placeholder="اختياري"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">

        <button class="btn btn-outline btn-full" onclick="closeModal('modal-edit-idea')">إلغاء</button>
      </div>
    </div>
  </div>
</div>

// GIST SYNC
// ═══════════════════════════════════════
async function loadFromGist() {
  setSyncStatus('⏳ جاري التزامن...');
  try {
    if (gistId) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (res.ok) {
        const data = await res.json();
        const content = data.files[GIST_FILENAME]?.content;
        if (content) {
          const parsed = JSON.parse(content);
          STATE = { ...STATE, ...parsed };
          setSyncStatus('✅ متزامن');
          return;
        }
      }
    }
    // No gist yet — create one
    await saveToGist();
  } catch(e) {
    setSyncStatus('⚠️ تعذر التزامن');
    console.error(e);
  }
}

async function saveToGist() {
  try {
    STATE.lastSync = new Date().toISOString();
    const body = JSON.stringify({
      description: 'Elhegaz Homes Social Media Planner',
      public: false,
      files: { [GIST_FILENAME]: { content: JSON.stringify(STATE, null, 2) } }
    });
    let res, data;
    if (gistId) {
      res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method:'PATCH', headers:{ Authorization:`token ${GITHUB_TOKEN}`, 'Content-Type':'application/json', Accept:'application/vnd.github.v3+json' }, body
      });
    } else {
      res = await fetch('https://api.github.com/gists', {
        method:'POST', headers:{ Authorization:`token ${GITHUB_TOKEN}`, 'Content-Type':'application/json', Accept:'application/vnd.github.v3+json' }, body
      });
    }
    data = await res.json();
    if (data.id) { gistId = data.id; localStorage.setItem('gist_id', gistId); }
    setSyncStatus('✅ متزامن');
  } catch(e) {
    setSyncStatus('⚠️ فشل الحفظ');
    console.error(e);
  }
}

function setSyncStatus(msg) {
  document.getElementById('sync-status').textContent = msg;
}

function getEmojiFromType(type) {
  if (type.includes('صورة')) return '📸';
  if (type.includes('ريلز')) return '🎬';
  if (type.includes('فيديو')) return '🎥';
  return '📝';
}

// HELPERS
// ═══════════════════════════════════════
const ARABIC_DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function formatDateAr(d) {
  return `${ARABIC_DAYS[d.getDay()]}، ${d.getDate()} ${ARABIC_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function getPubKey(date) {
  return `${date.getFullYear()}_${date.getMonth()}_${date.getDate()}`;
}

function isPublished(date) { return !!STATE.published[getPubKey(date)]; }

async function setPublished(date, val) {
  const key = getPubKey(date);
  if (val) STATE.published[key] = true; else delete STATE.published[key];
  await saveToGist();
}

function getPlanForDay(dayIndex) {
  return STATE.weekPlan.find(p => p.day === dayIndex) || null;
}

function getWeekDates() {
  const today = new Date();
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - today.getDay());
  return Array.from({length:7}, (_,i) => { const d = new Date(sunday); d.setDate(sunday.getDate()+i); return d; });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['today','week','month','ideas'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  const fab = document.getElementById('fab-btn');
  fab.style.display = tab === 'ideas' ? 'flex' : 'none';
  renderTab(tab);
}

function renderTab(tab) {
  if (tab==='today') renderToday();
  if (tab==='week') renderWeek();
  if (tab==='month') renderMonth();
  if (tab==='ideas') renderIdeas();
}

function fabAction() { openAddIdea(); }

// TODAY
// ═══════════════════════════════════════
function renderToday() {
  const today = new Date();
  const plan = getPlanForDay(today.getDay());
  const pub = isPublished(today);
  const total = plan ? 1 : 0;
  const done = (plan && pub) ? 1 : 0;

  let html = `
    <div class="date-header">
      <div><div class="date-text">${formatDateAr(today)}</div><div class="date-sub">الحجاز هومز — الغردقة</div></div>
      <span style="font-size:1.8rem">📅</span>
    </div>
    <div class="progress-card">
      <div class="progress-label">تقدم النشر اليوم</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${total?((done/total)*100):0}%"></div></div>
      <div class="progress-count">${total ? `نشرت ${done} من ${total}` : 'مفيش محتوى اليوم'}</div>
    </div>
  `;

  if (!plan) {
    html += `<div class="empty-state"><span>😴</span>مفيش محتوى مجدول النهارده<br>يوم راحة!</div>`;
  } else {
    html += `
      <div class="post-card ${pub?'published':''}">
        <div class="post-card-top">
          <span class="post-type-badge">${plan.type}</span>
          <span class="post-topic">${plan.topic}</span>
        </div>
        <div class="post-actions">
          <button class="btn btn-outline" onclick="showView('${esc(plan.topic)}','${esc(plan.type)}','${esc(plan.caption)}')">📋 الكابشن</button>
          ${plan.scenario ? `<button class="btn btn-accent" onclick="showView('${esc(plan.topic)}','سيناريو التصوير','${esc(plan.scenario)}')">🎬 السيناريو</button>` : ''}
        </div>
        <div class="card-edit-row">
          <button class="btn btn-outline btn-sm" onclick="openEditPost(${plan.day})">✏️ تعديل</button>
        </div>
        <label class="publish-check">
          <input type="checkbox" ${pub?'checked':''} onchange="togglePub(this)">
          <span class="publish-check-label">${pub?'✅ تم النشر اليوم!':'⬜ نشرت المحتوى؟'}</span>
        </label>
      </div>
    `;
  }
  document.getElementById('panel-today').innerHTML = html;
}

async function togglePub(cb) {
  await setPublished(new Date(), cb.checked);
  renderToday();
}

// ═══════════════════════════════════════
// WEEK
// ═══════════════════════════════════════
function renderWeek() {
  const today = new Date();
  const html = getWeekDates().map(date => {
    const plan = getPlanForDay(date.getDay());
    const pub = isPublished(date);
    const isToday = date.toDateString() === today.toDateString();
    return `
      <div class="week-day ${isToday?'today':''} ${pub?'published-day':''}">
        <div>
          <div class="day-name">${ARABIC_DAYS[date.getDay()]}</div>
          <div class="day-date">${date.getDate()} ${ARABIC_MONTHS[date.getMonth()]}</div>
        </div>
        <div class="day-content" style="cursor:${plan?'pointer':'default'}" onclick="${plan?`showView('${esc(plan.topic)}','${esc(plan.type)}','${esc(plan.caption)}')`:''}">
          ${plan ? `<div class="day-type">${plan.type}</div><div class="day-topic">${plan.topic}</div>` : `<div class="day-topic" style="color:#ccc">— يوم راحة —</div>`}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="day-status">${plan?(pub?'✅':'⬜'):''}</div>
          ${plan?`<button class="btn btn-outline btn-sm" onclick="openEditPost(${plan.day})">✏️</button>`:''}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('panel-week').innerHTML = html;
}

// ═══════════════════════════════════════
// MONTH
// ═══════════════════════════════════════
function renderMonth() {
  const today = new Date();
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();

  let html = `<div class="month-header">${ARABIC_MONTHS[today.getMonth()]} ${today.getFullYear()}</div><div class="calendar-grid">`;
  html += ARABIC_DAYS.map(d=>`<div class="cal-header">${d.slice(0,1)}</div>`).join('');
  for (let i=0;i<firstDay.getDay();i++) html+=`<div class="cal-day empty"></div>`;
  for (let d=1;d<=daysInMonth;d++) {
    const date = new Date(today.getFullYear(), today.getMonth(), d);
    const plan = getPlanForDay(date.getDay());
    const pub = isPublished(date);
    const isToday = date.toDateString() === today.toDateString();
    html += `
      <div class="cal-day ${isToday?'today':''} ${plan?(pub?'published-cal':'has-content'):''}"
           onclick="${plan?`showView('${esc(plan.topic)}','${esc(plan.type)}','${esc(plan.caption)}')`:''}">
        <div class="cal-day-num">${d}</div>
        ${plan?`<span class="cal-day-emoji">${plan.emoji}</span>`:''}
        ${pub?`<span class="cal-day-check">✅</span>`:''}
      </div>`;
  }
  html += '</div>';
  document.getElementById('panel-month').innerHTML = html;
}

function toggleCol(btn) {
  const c = btn.nextElementSibling;
  c.classList.toggle('open');
  btn.querySelector('span:last-child').textContent = c.classList.contains('open')?'▲':'▼';
}

async function toggleIdeaUsed(id) {
  const idea = STATE.ideas.find(i=>i.id===id);
  if (idea) { idea.used = !idea.used; await saveToGist(); renderIdeas(); }
}

async function deleteIdea(id) {
  if (!confirm('هتحذف الفكرة دي؟')) return;
  STATE.ideas = STATE.ideas.filter(i=>i.id!==id);
  await saveToGist(); renderIdeas(); showToast('🗑️ اتحذفت الفكرة');
}

function openEditPost(dayIndex) {
  editingPostDay = dayIndex;
  const plan = getPlanForDay(dayIndex);
  if (!plan) return;
  document.getElementById('ep-type').value = plan.type;
  document.getElementById('ep-topic').value = plan.topic;
  document.getElementById('ep-caption').value = plan.caption;
  document.getElementById('ep-scenario').value = plan.scenario || '';
  openModal('modal-edit-post');
}

async function saveEditPost() {
  const plan = getPlanForDay(editingPostDay);
  if (!plan) return;
  plan.type = document.getElementById('ep-type').value;
  plan.emoji = getEmojiFromType(plan.type);
  plan.topic = document.getElementById('ep-topic').value;
  plan.caption = document.getElementById('ep-caption').value;
  plan.scenario = document.getElementById('ep-scenario').value || null;
  await saveToGist();
  closeModal('modal-edit-post');
  renderTab(currentTab);
  showToast('✅ اتحفظ البوست');
}

// ═══════════════════════════════════════
// ADD / EDIT IDEA
// ═══════════════════════════════════════
function openAddIdea() {
  editingIdeaId = null;
  document.getElementById('ei-title').textContent = '💡 إضافة فكرة جديدة';
  document.getElementById('ei-type').value = '📸 صورة';
  document.getElementById('ei-topic').value = '';
  document.getElementById('ei-caption').value = '';
  document.getElementById('ei-scenario').value = '';
  openModal('modal-edit-idea');
}

function openEditIdea(id) {
  editingIdeaId = id;
  const idea = STATE.ideas.find(i=>i.id===id);
  if (!idea) return;
  document.getElementById('ei-title').textContent = '✏️ تعديل الفكرة';
  document.getElementById('ei-type').value = idea.type;
  document.getElementById('ei-topic').value = idea.topic;
  document.getElementById('ei-caption').value = idea.caption;
  document.getElementById('ei-scenario').value = idea.scenario || '';
  openModal('modal-edit-idea');
}

async function saveEditIdea() {
  const type = document.getElementById('ei-type').value;
  const topic = document.getElementById('ei-topic').value.trim();
  if (!topic) { alert('اكتب موضوع الفكرة'); return; }
  if (editingIdeaId) {
    const idea = STATE.ideas.find(i=>i.id===editingIdeaId);
    if (idea) {
      idea.type = type; idea.emoji = getEmojiFromType(type);
      idea.topic = topic;
      idea.caption = document.getElementById('ei-caption').value;
      idea.scenario = document.getElementById('ei-scenario').value || null;
    }
    showToast('✅ اتعدلت الفكرة');
  } else {
    STATE.ideas.push({
      id: 'idea_'+Date.now(), type, emoji:getEmojiFromType(type), topic,
      caption: document.getElementById('ei-caption').value,
      scenario: document.getElementById('ei-scenario').value || null,
      used: false
    });
    showToast('✅ اتضافت الفكرة');
  }
  await saveToGist();
  closeModal('modal-edit-idea');
  renderIdeas();
}

// ═══════════════════════════════════════
// VIEW MODAL
// ═══════════════════════════════════════
function showView(title, type, body) {
  document.getElementById('mv-title').textContent = title;
  document.getElementById('mv-type').textContent = type;
  document.getElementById('mv-body').textContent = body;
  openModal('modal-view');
}

function closeModalView(e) { if(e.target===document.getElementById('modal-view')) closeModal('modal-view'); }
function closeModalViewDirect() { closeModal('modal-view'); }

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalIf(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

function esc(str) {
  if (!str) return '';
  return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/"/g,'&quot;');
}

// INIT
// ═══════════════════════════════════════
document.getElementById('fab-btn').style.display = 'none';
loadFromGist().then(() => renderToday());
</script>
